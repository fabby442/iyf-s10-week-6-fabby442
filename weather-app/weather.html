<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather App</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <h1>Weather App</h1>

    <form id="search-form">
        <input type="text" id="city-input" placeholder="Enter city name..." required>
        <button type="submit">Get Weather</button>
    </form>

    <div id="loading-weather" class="hidden">Loading...</div>
    <div id="error-weather" class="hidden"></div>

    <div id="weather-display" class="hidden">
        <h2 id="city-name"></h2>
        <div class="weather-main">
            <img id="weather-icon" src="" alt="Weather Icon">
            <p id="description"></p>
        </div>
        <p id="temperature"></p>
        <p id="feels-like"></p>
        <p id="humidity"></p>
        <p id="wind"></p>
        <p id="pressure"></p>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>5-Day Weather Forecast</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="weather-app">
    <h1>5-Day Weather Forecast</h1>

    <!-- Search Form -->
    <form id="search-form">
        <input type="text" id="city-input" placeholder="Enter city name..." required>
        <button type="submit">Search</button>
    </form>

    <!-- Loading and Error -->
    <div id="loading" class="hidden">Loading...</div>
    <div id="error" class="hidden error"></div>

    <!-- Forecast Display -->
    <div id="forecast-display" class="hidden">
        <h2 id="city-name"></h2>
        <div id="forecast-cards" class="forecast-cards"></div>
    </div>
</div>

<script src="js/weather.js"></script>
</body>
</html>
